<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SARAPULLOVE | GALACTIC LEGACY 2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Montserrat:wght@100;300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-bg: #02010a;
            --gold-rose: #f7d794;
            --cyan-neon: #3ae3f2;
            --pink-neon: #f78fb3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
            background: var(--base-bg); color: #fff; scroll-behavior: smooth;
        }

        /* --- 1. ВХОДНОЙ ЭКРАН --- */
        #splash {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at center, #1a113a 0%, #02010a 100%);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 1.5s cubic-bezier(0.19, 1, 0.22, 1), filter 1.5s;
        }
        #splash.hide { opacity: 0; filter: blur(20px); pointer-events: none; }
        
        .portal-btn {
            padding: 20px 60px; font-family: 'Cormorant Garamond'; font-size: 2rem;
            background: transparent; border: 1px solid var(--gold-rose); color: var(--gold-rose);
            border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 5px;
            transition: 0.5s;
        }
        .portal-btn:hover { background: var(--gold-rose); color: #000; box-shadow: 0 0 50px rgba(247, 215, 148, 0.6); }

        /* --- 2. ЖИВОЙ ФОН --- */
        #bg-canvas, #candy-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; transition: filter 0.8s; }
        #bg-canvas { opacity: 0.3; }

        /* --- 3. КУРСОР: ЧУПА-ЧУПС --- */
        #cursor {
            position: fixed; pointer-events: none; z-index: 20000;
            transform: translate(-50%, -50%); font-size: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        #cursor-trail {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--gold-rose);
            border-radius: 50%; pointer-events: none; z-index: 19999;
            transform: translate(-50%, -50%); transition: 0.1s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 0 15px var(--gold-rose), inset 0 0 15px var(--gold-rose); opacity: 0.5;
        }

        /* --- 4. НАВИГАЦИЯ --- */
        nav {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px);
            z-index: 5000; background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 40px; border-radius: 100px;
            display: flex; gap: 20px; border: 1px solid var(--border);
            transition: transform 1s 1s, filter 0.5s;
        }
        nav.show { transform: translateX(-50%) translateY(0); }
        nav button {
            background: none; border: none; font-family: 'Montserrat'; font-weight: 300;
            color: rgba(255,255,255,0.7); cursor: pointer; text-transform: uppercase; font-size: 0.75rem;
            letter-spacing: 3px; transition: 0.3s; padding: 5px 10px;
        }
        nav button:hover { color: #fff; }

        /* --- 5. СТРАНИЦЫ --- */
        .page { display: none; padding-top: 140px; min-height: 100vh; transition: filter 0.5s; }
        .page.active { display: block; }

        .hologram-sec {
            opacity: 0; transform: translateY(100px); filter: blur(10px);
            transition: opacity 1.2s, transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), filter 1.2s;
            margin-bottom: 100px;
        }
        .hologram-sec.visible { opacity: 1; transform: translateY(0); filter: blur(0); }

        /* --- КАРТОЧКИ ГЛАВНОЙ --- */
        .opal-card {
            background: var(--glass); backdrop-filter: blur(30px); border-radius: 40px; padding: 60px; 
            max-width: 1100px; margin: 0 auto; border: 1px solid var(--border); display: flex; align-items: center; gap: 50px;
        }
        .photo-frame { width: 45%; border-radius: 30px; overflow: hidden; border: 1px solid var(--border); }
        .photo-frame img { width: 100%; display: block; filter: grayscale(20%); transition: 0.5s; }
        .text-side h2 { font-family: 'Cormorant Garamond'; font-size: 5rem; color: #fff; margin-bottom: 15px; font-weight: 100; font-style: italic; }
        .joke-box { font-weight: 100; color: rgba(255,255,255,0.6); border-left: 2px solid var(--cyan-neon); padding-left: 25px; font-size: 1.1rem; line-height: 1.8; }

        /* --- АЛЬБОМ И ЗУМ (ИСПРАВЛЕННЫЙ) --- */
        .album-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px; padding: 0 5% 100px;
        }
        .grid-item {
            background: var(--glass); border-radius: 20px; border: 1px solid var(--border);
            padding: 10px; transition: 0.4s; position: relative;
        }
        .grid-item img { 
            width: 100%; border-radius: 15px; filter: saturate(80%); 
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), filter 0.3s; 
            cursor: pointer; z-index: 1; position: relative;
        }
        
        /* Состояние расширенного фото: убираем блюр именно с него */
        .grid-item.expanded img {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(1);
            width: auto; max-width: 85vw; max-height: 85vh; 
            z-index: 15000 !important; /* Выше всего */
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border: 1px solid var(--gold-rose);
            filter: saturate(100%) blur(0) !important; /* Гарантируем отсутствие блюра */
        }

        /* Блюрим всё КРОМЕ расширенного фото */
        body.focused .hologram-sec:not(.has-expanded), 
        body.focused nav, 
        body.focused #bg-canvas, 
        body.focused #candy-canvas {
            filter: blur(20px) brightness(0.4);
        }

        #music-btn {
            position: fixed; bottom: 30px; left: 30px; z-index: 5000;
            background: var(--glass); color: #fff; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        @media (max-width: 900px) {
            .opal-card { flex-direction: column; text-align: center; padding: 30px; }
            .photo-frame { width: 100%; }
            .grid-item.expanded img { max-width: 95vw; }
        }
    </style>
</head>
<body id="main-body">

    <div id="splash">
        <h1 style="font-family: 'Cormorant Garamond'; color: #fff; font-size: 4rem; font-style: italic; font-weight: 100;">Sarapullove</h1>
        <button class="portal-btn" onclick="openPortal()">Activate Legacy</button>
    </div>

    <canvas id="bg-canvas"></canvas>
    <canvas id="candy-canvas"></canvas>
    
    <div id="cursor">🍭</div>
    <div id="cursor-trail"></div>

    <nav id="navbar">
        <button onclick="nav('home')">Основа</button>
        <button onclick="nav('album')">Альбом</button>
    </nav>

    <div id="music-btn" onclick="toggle()">♪</div>
    <audio id="track" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div id="home" class="page active">
        <section class="hologram-sec" style="text-align: center; margin-bottom: 70px;">
            <h1 style="font-family: 'Cormorant Garamond'; font-size: 6vw; color: #fff; font-style: italic; font-weight: 100;">Origin Pillars</h1>
        </section>

        <section class="hologram-sec">
            <div class="opal-card">
                <div class="photo-frame"><img src="https://i.imgur.com/DtgvEMC.jpg"></div>
                <div class="text-side">
                    <h2>Мама</h2>
                    <div class="joke-box">«Мам, я есть хочу!» — «Сходи на кухню...» 🍎</div>
                </div>
            </div>
        </section>

        <section class="hologram-sec">
            <div class="opal-card" style="flex-direction: row-reverse;">
                <div class="photo-frame"><img src="https://i.imgur.com/s4bocNt.jpg"></div>
                <div class="text-side" style="text-align: right;">
                    <h2>Геля</h2>
                    <div class="joke-box" style="border-left:none; border-right:2px solid var(--pink-neon); padding-right:25px;">— Геля, отдыхала от школы! 😂</div>
                </div>
            </div>
        </section>

        <section class="hologram-sec">
            <div class="opal-card">
                <div class="photo-frame"><img src="https://i.imgur.com/EJ3ifaJ.jpg"></div>
                <div class="text-side">
                    <h2>Кристина</h2>
                    <div class="joke-box" style="border-color: var(--gold-rose);">— Кристина, я творческая личность! ✨</div>
                </div>
            </div>
        </section>
    </div>

    <div id="album" class="page">
        <div class="album-grid">
            <div class="grid-item hologram-sec" onclick="expandImg(this)"><img src="https://i.imgur.com/qrbwqx6.jpg"></div>
            <div class="grid-item hologram-sec" onclick="expandImg(this)"><img src="https://i.imgur.com/Pf8vQNK.jpg"></div>
            <div class="grid-item hologram-sec" onclick="expandImg(this)"><img src="https://i.imgur.com/bT7swwk.jpg"></div>
            <div class="grid-item hologram-sec" onclick="expandImg(this)"><img src="https://i.imgur.com/E2XmP5g.jpg"></div>
            <div class="grid-item hologram-sec" onclick="expandImg(this)"><img src="https://i.imgur.com/LW1B50s.jpg"></div>
            <div class="grid-item hologram-sec" onclick="expandImg(this)"><img src="https://i.imgur.com/X5E9jlo.jpg"></div>
        </div>
    </div>

    <script>
        function expandImg(el) {
            const body = document.getElementById('main-body');
            const sec = el.closest('.hologram-sec');
            
            if (el.classList.contains('expanded')) {
                el.classList.remove('expanded');
                sec.classList.remove('has-expanded');
                body.classList.remove('focused');
            } else {
                document.querySelectorAll('.grid-item').forEach(i => {
                    i.classList.remove('expanded');
                    i.closest('.hologram-sec').classList.remove('has-expanded');
                });
                el.classList.add('expanded');
                sec.classList.add('has-expanded');
                body.classList.add('focused');
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'IMG' && document.querySelector('.expanded')) {
                document.querySelectorAll('.grid-item').forEach(i => {
                    i.classList.remove('expanded');
                    i.closest('.hologram-sec').classList.remove('has-expanded');
                });
                document.getElementById('main-body').classList.remove('focused');
            }
        }, true);

        const mouse = { x: 0, y: 0 };
        const cursor = document.getElementById('cursor');
        const trail = document.getElementById('cursor-trail');
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            cursor.style.left = mouse.x + 'px'; cursor.style.top = mouse.y + 'px';
            trail.style.left = mouse.x + 'px'; trail.style.top = mouse.y + 'px';
        });

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        function resize() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        function drawBg() {
            bgCtx.clearRect(0,0,bgCanvas.width, bgCanvas.height);
            bgCtx.strokeStyle = 'rgba(255,255,255,0.02)';
            for(let x = (mouse.x/20)%50; x < bgCanvas.width; x+=50) {
                bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,bgCanvas.height); bgCtx.stroke();
            }
            for(let y = (mouse.y/20)%50; y < bgCanvas.height; y+=50) {
                bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(bgCanvas.width,y); bgCtx.stroke();
            }
            requestAnimationFrame(drawBg);
        }
        drawBg();

        const candyCanvas = document.getElementById('candy-canvas');
        const candyCtx = candyCanvas.getContext('2d');
        let candies = [];
        const types = ['🍭', '🍬', '✨', '🌟', '💖'];
        function resizeC() { candyCanvas.width = window.innerWidth; candyCanvas.height = window.innerHeight; }
        resizeC();
        class Candy {
            constructor() { this.reset(); this.y = Math.random()*candyCanvas.height; }
            reset() { this.x = Math.random()*candyCanvas.width; this.y = -50; this.size = Math.random()*20+15; this.speed = Math.random()*1+0.3; this.emoji = types[Math.floor(Math.random()*types.length)]; }
            update() { this.y += this.speed; if (this.y > candyCanvas.height) this.reset(); }
            draw() { candyCtx.font = `${this.size}px serif`; candyCtx.fillText(this.emoji, this.x, this.y); }
        }
        for(let i=0; i<30; i++) candies.push(new Candy());
        function animC() { candyCtx.clearRect(0,0,candyCanvas.width, candyCanvas.height); candies.forEach(c => {c.update(); c.draw();}); requestAnimationFrame(animC); }
        animC();

        const obs = new IntersectionObserver((es) => { es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
        function refresh() { document.querySelectorAll('.hologram-sec').forEach(h => obs.observe(h)); }
        function openPortal() { document.getElementById('splash').classList.add('hide'); document.getElementById('navbar').classList.add('show'); setTimeout(refresh, 1000); document.getElementById('track').play(); }
        function nav(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); setTimeout(refresh, 100); }
        function toggle() { const t = document.getElementById('track'); if(t.paused) t.play(); else t.pause(); }
    </script>
</body>
</html>
